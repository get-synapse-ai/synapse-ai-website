<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse AI</title>
    <meta name="description" content="Synapse AI — bespoke machine intelligence. San Francisco.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js importmap -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: #00000a;
            font-family: 'Share Tech Mono', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Vignette overlay */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,8,0.85) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline overlay */
        #scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.07) 3px,
                rgba(0, 0, 0, 0.07) 4px
            );
            opacity: 0.35;
        }

        /* Foreground content */
        #content {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #content a {
            pointer-events: auto;
        }

        .company-name {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(2.5rem, 8vw, 6rem);
            letter-spacing: 0.25em;
            color: rgba(220, 240, 255, 1);
            text-shadow:
                0 0 20px rgba(0, 200, 255, 0.6),
                0 0 60px rgba(0, 200, 255, 0.3),
                0 0 120px rgba(0, 200, 255, 0.15);
            text-transform: uppercase;
            user-select: none;
        }

        .tagline {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.85rem, 2.2vw, 1.3rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            color: rgba(160, 195, 230, 0.85);
            margin-top: 1.2rem;
            user-select: none;
        }

        .tagline::after {
            content: '\2588';
            animation: blink 1s step-end infinite;
            color: rgba(0, 200, 255, 0.7);
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .contact {
            margin-top: 4rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.8rem, 1.6vw, 1.05rem);
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .contact a {
            color: rgba(0, 210, 255, 0.85);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .contact a:hover {
            color: rgba(0, 220, 255, 1);
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.5);
        }

        .prompt-char {
            color: rgba(0, 200, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="scanlines"></div>

    <div id="content">
        <h1 class="company-name">Synapse AI</h1>
        <p class="tagline">bespoke machine intelligence. san francisco.</p>
        <div class="contact">
            <span class="prompt-char">&gt; </span><a href="mailto:contact@synapse-ai.biz">contact@synapse-ai.biz</a>
        </div>
    </div>

    <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x00000a);
    scene.fog = new THREE.FogExp2(0x00000f, 0.012);

    const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- Post-processing ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.9;
    bloomPass.strength  = 1.6;
    bloomPass.radius    = 0.6;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- Shaders ---
    const vertexShader = `
        attribute float aIsInput;
        attribute float aDendriteId;
        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDendriteId;
        varying float vDist;

        void main() {
            vUv = uv;
            vIsInput = aIsInput;
            vDendriteId = aDendriteId;
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vWorldPos = worldPos.xyz;
            vDist = length(worldPos.xyz);
            vNormal = normalize(normalMatrix * normal);
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    `;

    const fragmentShader = `
        uniform float uTime;
        uniform float uPulseProgress;
        uniform float uActivation;
        uniform vec3 uCameraPos;
        uniform vec2 uDPulse[8];

        varying vec2 vUv;
        varying vec3 vWorldPos;
        varying vec3 vNormal;
        varying float vIsInput;
        varying float vDendriteId;
        varying float vDist;

        float hash(vec3 p) {
            p = fract(p * 0.3183099 + .1);
            p *= 17.0;
            return fract(p.x * p.y * p.z * (p.x + p.y + p.z));
        }
        float noise(vec3 x) {
            vec3 i = floor(x);
            vec3 f = fract(x);
            f = f*f*(3.0-2.0*f);
            return mix(
                mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                    mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
                mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                    mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y),f.z);
        }

        void main() {
            vec3 viewDir = normalize(uCameraPos - vWorldPos);
            float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
            float n1 = noise(vWorldPos * 0.5 + uTime * 0.2);
            float n2 = noise(vWorldPos * 2.0 - uTime * 0.5);

            vec3 baseColor = vec3(0.01, 0.018, 0.03) + (vec3(0.08, 0.22, 0.28) * fresnel * n1);
            baseColor *= (0.5 + 0.5 * n2);

            // Dendritic input pulses — traveling inward from tips to soma
            vec3 dendPulseColor = vec3(0.0);
            if (vDendriteId >= 0.0) {
                for (int i = 0; i < 8; i++) {
                    if (abs(vDendriteId - uDPulse[i].x) < 0.5 && uDPulse[i].y > 0.0) {
                        float waveDist = vDist - uDPulse[i].y;
                        float core  = exp(-waveDist * waveDist * 8.0);
                        float trail = exp(-max(waveDist, 0.0) * 2.0) * step(0.0, waveDist);
                        float pi    = core * 3.5 + trail * 1.0;
                        dendPulseColor += vec3(3.5, 1.0, 0.1) * pi * (0.8 + 0.2*n2);
                    }
                }
            }

            // Axon output pulse — sharp wavefront traveling outward from soma
            vec3 pulseColor = vec3(0.0);
            if (vIsInput > 0.5 && uPulseProgress > 0.0) {
                float waveDist = vDist - uPulseProgress;
                float core  = exp(-waveDist * waveDist * 12.0);
                float trail = exp(min(waveDist, 0.0) * 2.5) * step(waveDist, 0.0);
                float pi    = core * 4.0 + trail * 0.8;
                pulseColor  = vec3(3.5, 1.0, 0.1) * pi * (0.8 + 0.2*n2);
            }

            // Soma glow — brief red flash when axon fires
            vec3 actColor = vec3(0.0);
            if (uActivation > 0.01) {
                float flash = uActivation * exp(-vDist * vDist * 0.06);
                vec3 flashColor = mix(vec3(1.0, 0.85, 0.6), vec3(1.0, 0.15, 0.05), clamp(uActivation * 0.5, 0.0, 1.0));
                actColor = flashColor * flash * 3.0;
            }

            gl_FragColor = vec4(baseColor + dendPulseColor + pulseColor + actColor, 1.0);
        }
    `;

    // --- Material ---
    const material = new THREE.ShaderMaterial({
        vertexShader, fragmentShader,
        uniforms: {
            uTime:          { value: 0 },
            uPulseProgress: { value: -10.0 },
            uActivation:    { value: 0 },
            uCameraPos:     { value: new THREE.Vector3() },
            uDPulse:        { value: Array.from({length: 8}, () => new THREE.Vector2(-1, -10)) }
        },
        transparent: false,
        depthWrite:  true,
        side: THREE.FrontSide
    });

    // --- Geometry helpers ---
    const structureGroup = new THREE.Group();
    scene.add(structureGroup);

    function createWanderingPath(start, dir, length, segments, jitterScale, endPoint) {
        let pts = [start.clone()];
        let curr = start.clone();
        let cDir = dir.clone().normalize();
        for (let i = 0; i < segments; i++) {
            cDir.x += (Math.random() - 0.5) * jitterScale;
            cDir.y += (Math.random() - 0.5) * jitterScale;
            cDir.z += (Math.random() - 0.5) * jitterScale;
            cDir.normalize();
            curr = curr.clone().add(cDir.clone().multiplyScalar(length / segments));
            pts.push(curr);
        }
        if (endPoint) {
            const approach = endPoint.clone().add(new THREE.Vector3(-1.5, 0, 0));
            pts[pts.length - 1] = approach;
            pts.push(endPoint.clone());
        }
        return new THREE.CatmullRomCurve3(pts);
    }

    function taperGeometry(geo, baseRadius, isInput) {
        const pos  = geo.attributes.position;
        const norm = geo.attributes.normal;
        const uv   = geo.attributes.uv;
        for (let i = 0; i < pos.count; i++) {
            const u = uv.getX(i);
            let t   = isInput ? (0.2 + u * 0.8) : (1.0 - u);
            const taper = Math.pow(t, 0.6);
            const shrink = baseRadius * (1.0 - taper);
            pos.setXYZ(i,
                pos.getX(i) - norm.getX(i) * shrink,
                pos.getY(i) - norm.getY(i) * shrink,
                pos.getZ(i) - norm.getZ(i) * shrink
            );
        }
        geo.computeVertexNormals();
    }

    function addBranch(curve, radius, isInput, dendriteId = -1.0) {
        const geo = new THREE.TubeGeometry(curve, Math.floor(curve.getLength() * 3), radius, 16, false);
        taperGeometry(geo, radius, isInput);
        const inputArr = new Float32Array(geo.attributes.position.count).fill(isInput ? 1.0 : 0.0);
        geo.setAttribute('aIsInput', new THREE.BufferAttribute(inputArr, 1));
        const dendArr = new Float32Array(geo.attributes.position.count).fill(dendriteId);
        geo.setAttribute('aDendriteId', new THREE.BufferAttribute(dendArr, 1));
        structureGroup.add(new THREE.Mesh(geo, material));
        return { curve };
    }

    // --- Soma ---
    const somaRadius = 3.3;
    const somaGeo = new THREE.IcosahedronGeometry(somaRadius, 32);
    const somaPos = somaGeo.attributes.position;
    for (let i = 0; i < somaPos.count; i++) {
        let v = new THREE.Vector3().fromBufferAttribute(somaPos, i);
        let dir = v.clone().normalize();
        // Low-frequency deformation — makes the overall shape blobby/irregular
        let blob = Math.sin(dir.x*1.2 + 0.3)*0.4 + Math.cos(dir.y*1.5 - dir.z*0.8)*0.35
                 + Math.sin(dir.z*1.1 + dir.x*0.7)*0.25;
        // High-frequency subtle ridges
        let ridges = Math.sin(v.x*4)*Math.cos(v.y*4)*Math.sin(v.z*4)*0.12
                   + Math.sin(v.x*7+v.y*5)*0.06;
        v.add(dir.multiplyScalar(blob + ridges));
        somaPos.setXYZ(i, v.x, v.y, v.z);
    }
    somaGeo.computeVertexNormals();
    const somaIsInput = new Float32Array(somaPos.count).fill(0.0);
    somaGeo.setAttribute('aIsInput', new THREE.BufferAttribute(somaIsInput, 1));
    const somaDendId = new Float32Array(somaPos.count).fill(-1.0);
    somaGeo.setAttribute('aDendriteId', new THREE.BufferAttribute(somaDendId, 1));
    structureGroup.add(new THREE.Mesh(somaGeo, material));

    // --- Axon (output) ---
    const axonCurve = createWanderingPath(
        new THREE.Vector3(-120, 0, 0), new THREE.Vector3(1, 0, 0), 121, 60, 0.04,
        new THREE.Vector3(-somaRadius * 0.1, 0, 0)
    );
    addBranch(axonCurve, 0.6, true);

    // --- Axon terminal branches ---
    const axonTerminalTips = [];
    for (let i = 0; i < 7; i++) {
        const t = 0.01 + Math.random() * 0.08;    // near the far end (t=0)
        const branchStart = axonCurve.getPoint(t);
        const tangent = axonCurve.getTangent(t);
        const rv = new THREE.Vector3(
            Math.random() - 0.5,
            Math.random() - 0.5,
            Math.random() - 0.5
        ).normalize();
        // Branch away from soma: negate tangent + random spread
        const bDir = tangent.clone().negate().add(rv.multiplyScalar(1.2)).normalize();
        const branchLen = 6 + Math.random() * 10;
        const branchCurve = createWanderingPath(branchStart, bDir, branchLen, 10, 0.5);
        axonTerminalTips.push(branchCurve.getPoint(1.0));  // store tip position
        // Mark as axon (aIsInput=1) for pulse effect; taper direction is acceptable on short branches
        const geo = new THREE.TubeGeometry(branchCurve, Math.floor(branchCurve.getLength() * 3), 0.2 + Math.random() * 0.15, 16, false);
        taperGeometry(geo, 0.2, false);  // thin at tip
        const inputArr = new Float32Array(geo.attributes.position.count).fill(1.0);  // pulse flows through
        geo.setAttribute('aIsInput', new THREE.BufferAttribute(inputArr, 1));
        const dendArr = new Float32Array(geo.attributes.position.count).fill(-1.0);
        geo.setAttribute('aDendriteId', new THREE.BufferAttribute(dendArr, 1));
        structureGroup.add(new THREE.Mesh(geo, material));
    }
    // Also include the main axon tip itself
    axonTerminalTips.push(axonCurve.getPoint(0.0));

    // --- Dendrites ---
    let totalDendrites = 0;
    for (let i = 0; i < 18; i++) {
        const dendId = totalDendrites++;
        let phi   = Math.random() * Math.PI * 2;
        let theta = Math.acos(Math.random() * 2 - 1);
        if (Math.cos(phi) * Math.sin(theta) < -0.3)
            phi = phi > Math.PI ? phi - Math.PI : phi + Math.PI;

        let startDir = new THREE.Vector3(
            Math.cos(phi)*Math.sin(theta),
            Math.sin(phi)*Math.sin(theta),
            Math.cos(theta)
        );
        let start = startDir.clone().multiplyScalar(somaRadius * 0.8);
        let length  = 20 + Math.random() * 30;
        let mainRadius = 0.4 + Math.random() * 0.3;
        let { curve: mainCurve } = addBranch(
            createWanderingPath(start, startDir, length, 25, 0.4),
            mainRadius, false, dendId
        );

        let numSec = Math.floor(Math.random() * 4) + 2;
        for (let j = 0; j < numSec; j++) {
            let t = 0.2 + Math.random() * 0.6;
            let bStart = mainCurve.getPoint(t);
            let tangent = mainCurve.getTangent(t);
            let rv = new THREE.Vector3(Math.random()-.5, Math.random()-.5, Math.random()-.5).normalize();
            let bDir = tangent.clone().cross(rv).normalize().add(tangent.multiplyScalar(0.5)).normalize();
            addBranch(
                createWanderingPath(bStart, bDir, (1-t)*length*(0.4+Math.random()*0.4), 15, 0.6),
                mainRadius*(1-t)*0.8, false, dendId
            );
        }
    }

    // --- Particles ---
    function makeParticles(count, spread, colorHex, size, opacity) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * spread;
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({
            color: colorHex,
            size,
            transparent: true,
            opacity,
            blending:   THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });
        return new THREE.Points(geo, mat);
    }

    const dustA = makeParticles(1200, 120, 0x442266, 0.08, 0.25);
    const dustB = makeParticles(400,  90, 0x553399, 0.16, 0.18);
    const dustC = makeParticles(120,  60, 0xaa55ff, 0.30, 0.12);
    scene.add(dustA, dustB, dustC);

    // Brownian motion updater for dust particles
    function brownianUpdate(points, scale, delta) {
        const pos = points.geometry.attributes.position.array;
        const dt = Math.sqrt(delta);
        for (let i = 0; i < pos.length; i++) {
            pos[i] += (Math.random() - 0.5) * scale * dt;
        }
        points.geometry.attributes.position.needsUpdate = true;
    }

    // --- Neurotransmitter particle system (same style as dust) ---
    const NT_COUNT = 60;
    const ntPositions = new Float32Array(NT_COUNT * 3);
    const ntLifetimes = new Float32Array(NT_COUNT);

    // Initialize offscreen
    for (let i = 0; i < NT_COUNT * 3; i++) ntPositions[i] = 9999;

    const ntGeo = new THREE.BufferGeometry();
    ntGeo.setAttribute('position', new THREE.BufferAttribute(ntPositions, 3));
    const ntMat = new THREE.PointsMaterial({
        color: 0xaa55ff,
        size: 0.30,
        transparent: true,
        opacity: 0.22,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
        sizeAttenuation: true,
        fog: false
    });
    const ntPoints = new THREE.Points(ntGeo, ntMat);
    ntPoints.frustumCulled = false;
    scene.add(ntPoints);

    let ntSpawned = false;
    function spawnNeurotransmitters() {
        for (let i = 0; i < NT_COUNT; i++) {
            const tip = axonTerminalTips[Math.floor(Math.random() * axonTerminalTips.length)];
            ntPositions[i*3]     = tip.x + (Math.random() - 0.5) * 3.0;
            ntPositions[i*3 + 1] = tip.y + (Math.random() - 0.5) * 3.0;
            ntPositions[i*3 + 2] = tip.z + (Math.random() - 0.5) * 3.0;
            ntLifetimes[i] = 4 + Math.random() * 5;
        }
        ntGeo.attributes.position.needsUpdate = true;
    }

    // --- Dendritic pulse system (shader-based) ---
    const MAX_DEND_PULSES = 8;
    const dendPulseSlots = Array.from({length: MAX_DEND_PULSES}, () => ({
        active: false,
        dendriteId: -1,
        progress: -10
    }));

    let dendSpawnAccum = 0;
    function spawnDendPulse() {
        const slot = dendPulseSlots.find(s => !s.active);
        if (!slot) return;
        slot.active = true;
        slot.dendriteId = Math.floor(Math.random() * totalDendrites);
        slot.progress = 55;   // start at far tip (high vDist)
    }

    // --- Axon firing state ---
    let somaCharge = 0;
    let somaFlashIntensity = 0;
    let axonFiring = false;
    let axonPulseProg = 0;
    let timeSinceLastFire = 0;
    let nextFireTime = 5 + Math.random() * 5;

    // --- Resize handler ---
    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
        composer.setSize(innerWidth, innerHeight);
    });

    // --- Animation loop ---
    const clock = new THREE.Clock();
    const rotAxis = new THREE.Vector3(0, 1, 0);

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        // Auto-rotate camera slowly around origin
        camera.position.applyAxisAngle(rotAxis, delta * 0.05);
        camera.lookAt(0, 0, 0);

        // Dust — pseudo-Brownian diffusion
        brownianUpdate(dustA, 0.3, delta);
        brownianUpdate(dustB, 0.25, delta);
        brownianUpdate(dustC, 0.2, delta);

        // Shader uniforms
        material.uniforms.uTime.value += delta;
        material.uniforms.uCameraPos.value.copy(camera.position);

        // --- Spawn dendritic pulses continuously ---
        dendSpawnAccum += delta;
        while (dendSpawnAccum > 0.35) {        // ~3 pulses per second
            dendSpawnAccum -= 0.35;
            if (Math.random() < 0.75) spawnDendPulse();
        }

        // --- Update dendritic pulses (travel inward from tips to soma) ---
        for (let i = 0; i < MAX_DEND_PULSES; i++) {
            const slot = dendPulseSlots[i];
            if (slot.active) {
                slot.progress -= delta * 25.0;       // similar speed to axon
                if (slot.progress < 3.0) {
                    slot.active = false;
                    slot.progress = -10;
                    somaCharge++;
                    somaFlashIntensity = Math.min(somaFlashIntensity + 0.3, 1.0);
                }
            }
            material.uniforms.uDPulse.value[i].set(slot.dendriteId, slot.progress);
        }

        // --- Soma glow: decays over time, bumped by arriving signals ---
        somaFlashIntensity *= Math.exp(-delta * 6.0);
        material.uniforms.uActivation.value = somaFlashIntensity;

        // --- Axon fires after enough dendritic input + cooldown ---
        timeSinceLastFire += delta;
        if (!axonFiring && somaCharge >= 8 && timeSinceLastFire >= nextFireTime) {
            axonFiring = true;
            axonPulseProg = 2.5;
            somaCharge = 0;
            timeSinceLastFire = 0;
            nextFireTime = 6 + Math.random() * 8;       // 6-14s between fires
            somaFlashIntensity = 3.5;                    // bright red flash on spike
        }

        if (axonFiring) {
            axonPulseProg += delta * 28.0;               // outward propagation
            material.uniforms.uPulseProgress.value = axonPulseProg;

            // Spawn neurotransmitters when pulse reaches terminals
            if (axonPulseProg > 128 && !ntSpawned) {
                spawnNeurotransmitters();
                ntSpawned = true;
            }

            if (axonPulseProg > 130.0) {
                axonFiring = false;
                material.uniforms.uPulseProgress.value = -10.0;
            }
        } else {
            material.uniforms.uPulseProgress.value = -10.0;
            ntSpawned = false;
        }

        // --- Neurotransmitter diffusion (Brownian motion) ---
        {
            const dt = Math.sqrt(delta);
            let anyActive = false;
            for (let i = 0; i < NT_COUNT; i++) {
                if (ntLifetimes[i] > 0) {
                    anyActive = true;
                    ntLifetimes[i] -= delta;
                    ntPositions[i*3]     += (Math.random() - 0.5) * 1.5 * dt;
                    ntPositions[i*3 + 1] += (Math.random() - 0.5) * 1.5 * dt;
                    ntPositions[i*3 + 2] += (Math.random() - 0.5) * 1.5 * dt;
                    if (ntLifetimes[i] <= 0) {
                        ntPositions[i*3] = 9999;
                        ntPositions[i*3 + 1] = 9999;
                        ntPositions[i*3 + 2] = 9999;
                    }
                }
            }
            if (anyActive) ntGeo.attributes.position.needsUpdate = true;
        }

        composer.render();
    }

    animate();
    </script>
