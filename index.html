<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse AI</title>
    <meta name="description" content="Synapse AI — bespoke machine intelligence. San Francisco.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Three.js importmap -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            background: #00000a;
            font-family: 'Share Tech Mono', monospace;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        /* Vignette overlay */
        #vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,8,0.85) 100%);
            pointer-events: none;
            z-index: 1;
        }

        /* Scanline overlay */
        #scanlines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.07) 3px,
                rgba(0, 0, 0, 0.07) 4px
            );
            opacity: 0.35;
        }

        /* Foreground content */
        #content {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        #content a {
            pointer-events: auto;
        }

        .company-name {
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 6vw, 4.5rem);
            letter-spacing: 0.25em;
            color: rgba(200, 230, 255, 0.95);
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.3), 0 0 80px rgba(0, 200, 255, 0.1);
            text-transform: uppercase;
            user-select: none;
        }

        .tagline {
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.7rem, 1.8vw, 1rem);
            letter-spacing: 0.15em;
            color: rgba(120, 160, 200, 0.6);
            margin-top: 1rem;
            user-select: none;
        }

        .tagline::after {
            content: '\2588';
            animation: blink 1s step-end infinite;
            color: rgba(0, 200, 255, 0.7);
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .contact {
            margin-top: 4rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: clamp(0.65rem, 1.4vw, 0.85rem);
            letter-spacing: 0.1em;
        }

        .contact a {
            color: rgba(0, 200, 255, 0.7);
            text-decoration: none;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .contact a:hover {
            color: rgba(0, 220, 255, 1);
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.5);
        }

        .prompt-char {
            color: rgba(0, 200, 255, 0.4);
        }
    </style>
</head>
<body>
    <div id="vignette"></div>
    <div id="scanlines"></div>

    <div id="content">
        <h1 class="company-name">Synapse AI</h1>
        <p class="tagline">bespoke machine intelligence. san francisco.</p>
        <div class="contact">
            <span class="prompt-char">&gt; </span><a href="mailto:contact@synapse-ai.biz">contact@synapse-ai.biz</a>
        </div>
    </div>

    <!-- Three.js background script added in next task -->
</body>
</html>
